<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet"href="style.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="choices">
    <div class="choice" id="rock">
        <img src="https://pujitha-cse.github.io/Rock-Paper-Scissor-Game/rock.png" alt="Rock">
    </div>
    <div class="choice" id="paper">
        <img src="https://th.bing.com/th/id/OIP.hZ19DgfkM-W7JY_9A1YFugHaEK?w=321&h=180&c=7&r=0&o=7&pid=1.7&rm=3" alt="Paper">
    </div>
    <div class="choice"id="scissors">
        <img src="https://mr-dk07.github.io/Rock-Paper-Scissors/images/scissors.png" alt="scissors">
    </div>
    </div>

    <div class="score-board">
        <div class="score">
        <p id="user-score">0</p>
        <p>you</p>
    </div>
    
    <div class="score">
        <p id="comp-score">0</p>
        <p>comp</p>
    </div>
    </div>
    <div class="msg-container">
        <p id="msg">play your move</p>
    </div>
    <script src="script.js"></script> 
</body>
</html>
